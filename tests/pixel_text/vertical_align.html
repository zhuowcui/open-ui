<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 20px; font-family: "DejaVu Sans", sans-serif; background: white; color: black; font-size: 16px; }
.container { width: 400px; }
.line { margin-bottom: 15px; line-height: 40px; border-bottom: 1px solid #eee; }
.big { font-size: 24px; }
.small { font-size: 10px; }
.va-baseline { vertical-align: baseline; }
.va-top { vertical-align: top; }
.va-bottom { vertical-align: bottom; }
.va-middle { vertical-align: middle; }
.va-sub { vertical-align: sub; }
.va-super { vertical-align: super; }
.va-text-top { vertical-align: text-top; }
.va-text-bottom { vertical-align: text-bottom; }
</style>
</head>
<body>
<div class="container">
  <div class="line">Normal <span class="small va-baseline">baseline</span> text here.</div>
  <div class="line">Normal <span class="small va-top">top</span> text here.</div>
  <div class="line">Normal <span class="small va-bottom">bottom</span> text here.</div>
  <div class="line">Normal <span class="small va-middle">middle</span> text here.</div>
  <div class="line">Normal <span class="small va-sub">sub</span> text here.</div>
  <div class="line">Normal <span class="small va-super">super</span> text here.</div>
  <div class="line">Normal <span class="small va-text-top">text-top</span> text here.</div>
  <div class="line">Normal <span class="small va-text-bottom">text-bottom</span> text here.</div>
</div>
</body>
</html>
