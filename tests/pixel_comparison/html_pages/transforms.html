<!DOCTYPE html>
<html>
<head><style>
  * { margin: 0; padding: 0; }
  body { background: white; }
  .container {
    width: 300px;
    height: 300px;
    margin: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rotated {
    width: 120px;
    height: 80px;
    background: #9b59b6;
    transform: rotate(45deg);
  }
  .scaled {
    width: 100px;
    height: 100px;
    background: #e67e22;
    transform: scale(1.5);
    position: absolute;
    left: 400px;
    top: 50px;
  }
  .skewed {
    width: 150px;
    height: 60px;
    background: #1abc9c;
    transform: skewX(-15deg);
    position: absolute;
    left: 50px;
    top: 350px;
  }
  .multi {
    width: 80px;
    height: 80px;
    background: #e74c3c;
    transform: rotate(30deg) scale(1.2) translateX(20px);
    position: absolute;
    left: 400px;
    top: 300px;
  }
</style></head>
<body>
  <div class="container"><div class="rotated"></div></div>
  <div class="scaled"></div>
  <div class="skewed"></div>
  <div class="multi"></div>
</body>
</html>
