<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>SVG Advanced Test</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; width: 800px; height: 600px; font-family: system-ui, -apple-system, sans-serif; font-size: 10px; color: #2d3436; background: #f8f9fa; overflow: hidden; }
.outer { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; }
.panel { background: #ffffff; border: 1px solid #dfe6e9; border-radius: 4px; padding: 6px; overflow: hidden; }
.panel h3 { margin: 0 0 4px; font-size: 9px; color: #6c5ce7; text-transform: uppercase; }
.lbl { font-size: 8px; color: #636e72; margin: 1px 0; font-family: monospace; }
.span2 { grid-column: span 2; }
</style>
</head>
<body>
<div class="outer">
  <!-- linearGradient -->
  <div class="panel">
    <h3>linearGradient</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#00b894"/>
        </linearGradient>
        <linearGradient id="lg2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e74c3c"/><stop offset="50%" stop-color="#f39c12"/><stop offset="100%" stop-color="#f1c40f"/>
        </linearGradient>
        <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0984e3"/><stop offset="100%" stop-color="#a29bfe"/>
        </linearGradient>
      </defs>
      <rect x="5" y="5" width="110" height="55" rx="6" fill="url(#lg1)"/>
      <rect x="125" y="5" width="110" height="55" rx="6" fill="url(#lg2)"/>
      <circle cx="305" cy="32" r="28" fill="url(#lg3)"/>
    </svg>
  </div>

  <!-- radialGradient -->
  <div class="panel">
    <h3>radialGradient</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <defs>
        <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffeaa7"/><stop offset="100%" stop-color="#e17055"/>
        </radialGradient>
        <radialGradient id="rg2" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#6c5ce7"/>
        </radialGradient>
        <radialGradient id="rg3" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#55efc4"/><stop offset="50%" stop-color="#00b894"/><stop offset="100%" stop-color="#2d3436"/>
        </radialGradient>
      </defs>
      <circle cx="40" cy="35" r="30" fill="url(#rg1)"/>
      <circle cx="120" cy="35" r="30" fill="url(#rg2)"/>
      <rect x="165" y="5" width="80" height="55" rx="6" fill="url(#rg3)"/>
      <ellipse cx="310" cy="35" rx="50" ry="28" fill="url(#rg1)"/>
    </svg>
  </div>

  <!-- clipPath -->
  <div class="panel">
    <h3>clipPath</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <defs>
        <clipPath id="cp1"><circle cx="50" cy="35" r="28"/></clipPath>
        <clipPath id="cp2"><polygon points="160,7 190,35 160,63 130,35"/></clipPath>
        <clipPath id="cp3"><rect x="210" y="5" width="60" height="25" rx="5"/><rect x="210" y="35" width="60" height="25" rx="5"/></clipPath>
      </defs>
      <rect x="5" y="5" width="90" height="60" fill="url(#lg1)" clip-path="url(#cp1)"/>
      <rect x="105" y="5" width="90" height="60" fill="url(#lg2)" clip-path="url(#cp2)"/>
      <rect x="205" y="5" width="70" height="60" fill="url(#rg2)" clip-path="url(#cp3)"/>
      <text x="290" y="25" font-size="9" fill="#636e72">Clipped to</text>
      <text x="290" y="37" font-size="9" fill="#636e72">circle, diamond,</text>
      <text x="290" y="49" font-size="9" fill="#636e72">split rects</text>
    </svg>
  </div>

  <!-- mask -->
  <div class="panel">
    <h3>mask</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <defs>
        <mask id="m1">
          <rect x="0" y="0" width="100%" height="100%" fill="white"/>
          <circle cx="50" cy="35" r="20" fill="black"/>
        </mask>
        <mask id="m2">
          <linearGradient id="mg1" x1="0%" x2="100%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="black"/></linearGradient>
          <rect x="0" y="0" width="100%" height="100%" fill="url(#mg1)"/>
        </mask>
      </defs>
      <rect x="5" y="5" width="90" height="60" fill="#6c5ce7" mask="url(#m1)"/>
      <text x="25" y="38" font-size="9" fill="#ffffff">cutout</text>
      <rect x="110" y="5" width="150" height="60" fill="#e17055" mask="url(#m2)"/>
      <text x="140" y="38" font-size="9" fill="#ffffff">gradient fade</text>
    </svg>
  </div>

  <!-- filter -->
  <div class="panel">
    <h3>SVG filter (blur + colorMatrix)</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <defs>
        <filter id="f1"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter>
        <filter id="f2"><feGaussianBlur in="SourceGraphic" stdDeviation="4"/></filter>
        <filter id="f3">
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <filter id="f4">
          <feColorMatrix type="hueRotate" values="90"/>
        </filter>
      </defs>
      <circle cx="35" cy="35" r="25" fill="#6c5ce7"/>
      <text x="15" y="68" font-size="8" fill="#636e72">original</text>
      <circle cx="100" cy="35" r="25" fill="#6c5ce7" filter="url(#f1)"/>
      <text x="78" y="68" font-size="8" fill="#636e72">blur(2)</text>
      <circle cx="165" cy="35" r="25" fill="#6c5ce7" filter="url(#f2)"/>
      <text x="143" y="68" font-size="8" fill="#636e72">blur(4)</text>
      <circle cx="230" cy="35" r="25" fill="#6c5ce7" filter="url(#f3)"/>
      <text x="205" y="68" font-size="8" fill="#636e72">grayscale</text>
      <circle cx="300" cy="35" r="25" fill="#6c5ce7" filter="url(#f4)"/>
      <text x="275" y="68" font-size="8" fill="#636e72">hueRotate</text>
    </svg>
  </div>

  <!-- text + tspan -->
  <div class="panel">
    <h3>SVG text &amp; tspan</h3>
    <svg width="380" height="70" viewBox="0 0 380 70">
      <text x="10" y="20" font-size="14" fill="#6c5ce7" font-weight="bold">Bold SVG Text</text>
      <text x="10" y="38" font-size="12" fill="#2d3436">
        Normal <tspan fill="#e17055" font-weight="bold">red bold</tspan>
        <tspan fill="#00b894" font-style="italic"> green italic</tspan>
        <tspan fill="#0984e3" font-size="16"> big blue</tspan>
      </text>
      <text x="10" y="58" font-size="10" fill="#636e72" letter-spacing="3">SPACED OUT TEXT</text>
      <text x="240" y="58" font-size="10" fill="#636e72" text-decoration="underline">underlined</text>
    </svg>
  </div>

  <!-- use, defs, symbol -->
  <div class="panel">
    <h3>use, defs, symbol</h3>
    <svg width="380" height="80" viewBox="0 0 380 80">
      <defs>
        <symbol id="star" viewBox="0 0 24 24">
          <polygon points="12,2 15,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 9,9" fill="currentColor"/>
        </symbol>
        <symbol id="arrow" viewBox="0 0 24 24">
          <path d="M5,12 L19,12 M13,6 L19,12 L13,18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
      </defs>
      <use href="#star" x="5" y="5" width="28" height="28" style="color:#fdcb6e;"/>
      <use href="#star" x="40" y="5" width="28" height="28" style="color:#f39c12;"/>
      <use href="#star" x="75" y="5" width="28" height="28" style="color:#e17055;"/>
      <use href="#star" x="110" y="5" width="22" height="22" style="color:#b2bec3;"/>
      <use href="#star" x="135" y="5" width="22" height="22" style="color:#b2bec3;"/>
      <use href="#arrow" x="5" y="40" width="30" height="30" style="color:#6c5ce7;"/>
      <use href="#arrow" x="45" y="40" width="30" height="30" style="color:#00b894;"/>
      <use href="#arrow" x="85" y="40" width="30" height="30" style="color:#e17055;" transform="rotate(90,100,55)"/>
      <text x="170" y="25" font-size="9" fill="#636e72">Reusable symbols</text>
      <text x="170" y="40" font-size="9" fill="#636e72">via &lt;use&gt; with</text>
      <text x="170" y="55" font-size="9" fill="#636e72">different colors/sizes</text>
    </svg>
  </div>

  <!-- pattern -->
  <div class="panel">
    <h3>pattern &amp; marker</h3>
    <svg width="380" height="80" viewBox="0 0 380 80">
      <defs>
        <pattern id="pat1" width="10" height="10" patternUnits="userSpaceOnUse">
          <rect width="10" height="10" fill="#f8f9fa"/>
          <circle cx="5" cy="5" r="2" fill="#6c5ce7"/>
        </pattern>
        <pattern id="pat2" width="12" height="12" patternUnits="userSpaceOnUse">
          <rect width="12" height="12" fill="#2d3436"/>
          <line x1="0" y1="0" x2="12" y2="12" stroke="#6c5ce7" stroke-width="1"/>
          <line x1="12" y1="0" x2="0" y2="12" stroke="#6c5ce7" stroke-width="1"/>
        </pattern>
        <marker id="mk1" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <circle cx="5" cy="5" r="4" fill="#e17055"/>
        </marker>
        <marker id="mk2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#0984e3"/>
        </marker>
      </defs>
      <rect x="5" y="5" width="80" height="60" rx="6" fill="url(#pat1)" stroke="#dfe6e9" stroke-width="1"/>
      <rect x="95" y="5" width="80" height="60" rx="6" fill="url(#pat2)" stroke="#dfe6e9" stroke-width="1"/>
      <line x1="195" y1="20" x2="280" y2="20" stroke="#636e72" stroke-width="2" marker-start="url(#mk1)" marker-end="url(#mk2)"/>
      <polyline points="195,50 225,35 255,55 285,40 315,60" fill="none" stroke="#636e72" stroke-width="2" marker-start="url(#mk1)" marker-mid="url(#mk1)" marker-end="url(#mk2)"/>
      <text x="195" y="75" font-size="8" fill="#636e72">markers on lines &amp; polylines</text>
    </svg>
  </div>
</div>
</body>
</html>
