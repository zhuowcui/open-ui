<!DOCTYPE html>
<html>
<head><style>
  * { margin: 0; padding: 0; }
  body { background: white; }
  .card {
    width: 200px;
    height: 150px;
    margin: 30px;
    background: #3498db;
    border-radius: 20px;
    box-shadow: 8px 8px 16px rgba(0,0,0,0.3);
  }
  .pill {
    width: 160px;
    height: 50px;
    margin: 30px;
    background: #e74c3c;
    border-radius: 25px;
  }
  .circle {
    width: 100px;
    height: 100px;
    margin: 30px;
    background: #2ecc71;
    border-radius: 50%;
  }
</style></head>
<body>
  <div class="card"></div>
  <div class="pill"></div>
  <div class="circle"></div>
</body>
</html>
