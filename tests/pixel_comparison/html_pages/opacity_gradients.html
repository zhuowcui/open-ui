<!DOCTYPE html>
<html>
<head><style>
  * { margin: 0; padding: 0; }
  body { background: white; }
  .base {
    width: 200px;
    height: 200px;
    background: #2c3e50;
    position: absolute;
    left: 50px;
    top: 50px;
  }
  .overlay1 {
    width: 200px;
    height: 200px;
    background: #e74c3c;
    opacity: 0.7;
    position: absolute;
    left: 100px;
    top: 100px;
  }
  .overlay2 {
    width: 200px;
    height: 200px;
    background: #3498db;
    opacity: 0.5;
    position: absolute;
    left: 150px;
    top: 50px;
  }
  .gradient-box {
    width: 300px;
    height: 100px;
    background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff);
    position: absolute;
    left: 50px;
    top: 320px;
  }
  .radial-box {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #ffff00, #ff6600, #cc0000);
    position: absolute;
    left: 400px;
    top: 320px;
  }
</style></head>
<body>
  <div class="base"></div>
  <div class="overlay2"></div>
  <div class="overlay1"></div>
  <div class="gradient-box"></div>
  <div class="radial-box"></div>
</body>
</html>
