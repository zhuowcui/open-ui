<!DOCTYPE html>
<html>
<head><style>
  * { margin: 0; padding: 0; }
  body { background: white; }
  .grid {
    display: grid;
    grid-template-columns: 100px 100px 100px;
    grid-template-rows: 100px 100px;
    width: 300px;
    height: 200px;
  }
  .c1 { background: #FF0000; }
  .c2 { background: #00FF00; }
  .c3 { background: #0000FF; }
  .c4 { background: #FFFF00; }
  .c5 { background: #FF00FF; }
  .c6 { background: #00FFFF; }
</style></head>
<body>
  <div class="grid">
    <div class="c1"></div>
    <div class="c2"></div>
    <div class="c3"></div>
    <div class="c4"></div>
    <div class="c5"></div>
    <div class="c6"></div>
  </div>
</body>
</html>
