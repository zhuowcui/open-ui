<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>Forms Test</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; width: 800px; height: 600px; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; color: #2d3436; background: #f8f9fa; overflow: hidden; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 6px; }
.cell { background: #ffffff; border: 1px solid #dfe6e9; border-radius: 4px; padding: 6px; }
.cell h3 { margin: 0 0 4px; font-size: 10px; color: #6c5ce7; text-transform: uppercase; }
label { display: block; font-size: 10px; color: #636e72; margin: 2px 0 1px; }
input[type="text"], input[type="password"], input[type="number"], input[type="date"],
textarea, select { width: 100%; padding: 3px 6px; border: 1px solid #b2bec3; border-radius: 3px; font-size: 11px; font-family: inherit; margin-bottom: 2px; }
input[type="text"]:focus, textarea:focus, select:focus { outline: 2px solid #6c5ce7; border-color: #6c5ce7; }
button, input[type="submit"], input[type="button"] { padding: 4px 10px; border: none; border-radius: 3px; font-size: 11px; cursor: pointer; font-family: inherit; }
.btn-primary { background: #6c5ce7; color: #ffffff; }
.btn-secondary { background: #dfe6e9; color: #2d3436; }
.btn-danger { background: #e74c3c; color: #ffffff; }
fieldset { border: 1px solid #b2bec3; border-radius: 4px; padding: 6px; margin: 0; }
legend { font-size: 10px; font-weight: 700; color: #6c5ce7; padding: 0 4px; }
.span2 { grid-column: span 2; }
.inline { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
</style>
</head>
<body>
<div class="grid">
  <!-- Text inputs -->
  <div class="cell">
    <h3>Text Inputs</h3>
    <label>Text</label>
    <input type="text" value="Hello World" placeholder="Enter text">
    <label>Password</label>
    <input type="password" value="secret123">
    <label>Number</label>
    <input type="number" value="42" min="0" max="100">
    <label>Date</label>
    <input type="date" value="2024-06-15">
  </div>

  <!-- Checkboxes & Radios -->
  <div class="cell">
    <h3>Checkbox &amp; Radio</h3>
    <fieldset>
      <legend>Checkboxes</legend>
      <div class="inline"><input type="checkbox" id="c1" checked><label for="c1" style="display:inline;margin:0;">Checked</label></div>
      <div class="inline"><input type="checkbox" id="c2"><label for="c2" style="display:inline;margin:0;">Unchecked</label></div>
      <div class="inline"><input type="checkbox" id="c3" disabled checked><label for="c3" style="display:inline;margin:0;color:#b2bec3;">Disabled</label></div>
    </fieldset>
    <fieldset style="margin-top:4px;">
      <legend>Radio Buttons</legend>
      <div class="inline"><input type="radio" name="r1" id="r1" checked><label for="r1" style="display:inline;margin:0;">Option A</label></div>
      <div class="inline"><input type="radio" name="r1" id="r2"><label for="r2" style="display:inline;margin:0;">Option B</label></div>
      <div class="inline"><input type="radio" name="r1" id="r3" disabled><label for="r3" style="display:inline;margin:0;color:#b2bec3;">Disabled</label></div>
    </fieldset>
  </div>

  <!-- Select & Textarea -->
  <div class="cell">
    <h3>Select &amp; Textarea</h3>
    <label>Select</label>
    <select>
      <option>Choose an option</option>
      <option selected>Option A</option>
      <option>Option B</option>
      <option>Option C</option>
    </select>
    <label>Select (disabled)</label>
    <select disabled><option>Disabled select</option></select>
    <label>Textarea</label>
    <textarea rows="3" style="resize:none;">Multi-line text content goes here.
Second line of text.</textarea>
  </div>

  <!-- Buttons -->
  <div class="cell">
    <h3>Buttons</h3>
    <div style="display:flex;flex-wrap:wrap;gap:4px;">
      <button class="btn-primary">Primary</button>
      <button class="btn-secondary">Secondary</button>
      <button class="btn-danger">Danger</button>
      <input type="submit" value="Submit" class="btn-primary">
      <input type="button" value="Button" class="btn-secondary">
      <button class="btn-primary" disabled style="opacity:0.5;">Disabled</button>
    </div>
    <h3 style="margin-top:6px;">Button Sizes</h3>
    <div style="display:flex;align-items:center;gap:4px;">
      <button style="background:#6c5ce7;color:#fff;border:none;border-radius:3px;padding:2px 6px;font-size:9px;">Small</button>
      <button style="background:#6c5ce7;color:#fff;border:none;border-radius:3px;padding:4px 10px;font-size:11px;">Medium</button>
      <button style="background:#6c5ce7;color:#fff;border:none;border-radius:3px;padding:6px 14px;font-size:13px;">Large</button>
    </div>
  </div>

  <!-- Range & Color -->
  <div class="cell">
    <h3>Range &amp; Color</h3>
    <label>Range (0-100)</label>
    <input type="range" min="0" max="100" value="60" style="width:100%;">
    <label>Range (disabled)</label>
    <input type="range" min="0" max="100" value="30" style="width:100%;" disabled>
    <label>Color</label>
    <div style="display:flex;gap:4px;">
      <input type="color" value="#6c5ce7">
      <input type="color" value="#e17055">
      <input type="color" value="#00b894">
    </div>
  </div>

  <!-- Progress & Meter -->
  <div class="cell">
    <h3>Progress &amp; Meter</h3>
    <label>Progress (75%)</label>
    <progress value="75" max="100" style="width:100%;height:16px;"></progress>
    <label>Progress (30%)</label>
    <progress value="30" max="100" style="width:100%;height:16px;"></progress>
    <label>Meter (optimum)</label>
    <meter value="0.8" min="0" max="1" low="0.3" high="0.7" optimum="0.9" style="width:100%;height:16px;"></meter>
    <label>Meter (low)</label>
    <meter value="0.2" min="0" max="1" low="0.3" high="0.7" optimum="0.9" style="width:100%;height:16px;"></meter>
    <label>Meter (high)</label>
    <meter value="0.5" min="0" max="1" low="0.3" high="0.7" optimum="0.9" style="width:100%;height:16px;"></meter>
  </div>

  <!-- Fieldset & Legend -->
  <div class="cell">
    <h3>Fieldset &amp; Legend</h3>
    <fieldset>
      <legend>Personal Info</legend>
      <label>Full Name</label>
      <input type="text" value="Jane Doe">
      <label>Email</label>
      <input type="text" value="jane@example.com">
    </fieldset>
    <fieldset disabled style="margin-top:4px;opacity:0.6;">
      <legend>Disabled Fieldset</legend>
      <label>Cannot edit</label>
      <input type="text" value="Locked">
    </fieldset>
  </div>

  <!-- Output & Datalist -->
  <div class="cell">
    <h3>Output &amp; Datalist</h3>
    <label>Output</label>
    <output style="display:block;background:#ffeaa7;padding:4px 8px;border-radius:3px;font-weight:700;color:#2d3436;">42</output>
    <label>Input with Datalist</label>
    <input type="text" list="fruits" placeholder="Type a fruit" style="width:100%;">
    <datalist id="fruits">
      <option value="Apple">
      <option value="Banana">
      <option value="Cherry">
      <option value="Date">
      <option value="Elderberry">
    </datalist>
    <label style="margin-top:4px;">Disabled input</label>
    <input type="text" value="Cannot edit" disabled style="width:100%;background:#f0f0f0;">
  </div>

  <!-- Complete form -->
  <div class="cell">
    <h3>Complete Mini Form</h3>
    <form>
      <label>Username</label>
      <input type="text" placeholder="Enter username">
      <label>Password</label>
      <input type="password" placeholder="Enter password">
      <div class="inline" style="margin-top:4px;">
        <input type="checkbox" id="remember" checked>
        <label for="remember" style="display:inline;margin:0;">Remember me</label>
      </div>
      <div style="margin-top:6px;display:flex;gap:4px;">
        <button type="submit" class="btn-primary" style="flex:1;">Log In</button>
        <button type="reset" class="btn-secondary">Reset</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
