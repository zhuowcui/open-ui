<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<title>Login Form</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #2d3748;
  background: #edf2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 800px;
}

.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 48px 40px;
  width: 420px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo .icon {
  width: 56px;
  height: 56px;
  background: #4299e1;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #ffffff;
  margin-bottom: 16px;
}
.logo h1 { font-size: 24px; color: #1a202c; }
.logo p { font-size: 14px; color: #718096; margin-top: 4px; }

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: #4a5568;
  margin-bottom: 6px;
}
.form-group input[type="text"],
.form-group input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  color: #2d3748;
  background: #ffffff;
  outline: none;
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: #4a5568;
}
.remember input[type="checkbox"] {
  width: 16px;
  height: 16px;
}
.forgot {
  font-size: 14px;
  color: #4299e1;
  text-decoration: none;
  font-weight: 500;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: #4299e1;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 20px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.divider .line { flex: 1; height: 1px; background: #e2e8f0; }
.divider span { font-size: 13px; color: #a0aec0; }

.signup {
  text-align: center;
  font-size: 14px;
  color: #718096;
}
.signup a { color: #4299e1; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🔑</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="text" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password">
    </div>
    <div class="options">
      <label class="remember">
        <input type="checkbox"> Remember me
      </label>
      <a class="forgot" href="#">Forgot password?</a>
    </div>
    <button class="login-btn">Sign In</button>
    <div class="divider">
      <div class="line"></div>
      <span>or</span>
      <div class="line"></div>
    </div>
    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>
</body>
</html>
